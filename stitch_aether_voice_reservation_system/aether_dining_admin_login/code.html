<!DOCTYPE html>

<html class="dark" lang="en"><head>

                    "surface-container-high": "#2d2a21",
                    "surface-container-low": "#1f1b13",
                    "warning": "#FF9500",
                    "on-secondary-fixed": "#1c1b1b",
                    "tertiary": "#d0cecb",
                    "charcoal": "#1A1A1A",
                    "surface": "#16130b",
                    "tertiary-fixed": "#e4e2de",
                    "error": "#ffb4ab",
                    "on-secondary": "#313030",
                    "tertiary-container": "#b4b3af",
                    "surface-container-lowest": "#110e07",
                    "on-error-container": "#ffdad6",
                    "primary": "#f2ca50",
                    "on-surface-variant": "#d0c5af",
                    "soft-ivory": "#FDFBF7",
                    "inverse-primary": "#735c00",
                    "surface-container-highest": "#38342b",
                    "inverse-surface": "#eae1d4",
                    "surface-container": "#231f17",
                    "surface-tint": "#e9c349",
                    "inverse-on-surface": "#343027",
                    "on-tertiary-fixed": "#1b1c1a",
                    "on-secondary-container": "#bab8b7",
                    "warm-amber": "#E5A93B",
                    "on-tertiary-container": "#454543",
                    "surface-dim": "#16130b",
                    "primary-container": "#d4af37",
                    "on-primary-fixed-variant": "#574500",
                    "on-primary": "#3c2f00",
                    "obsidian": "#121212",
                    "on-tertiary-fixed-variant": "#474744",
                    "on-secondary-fixed-variant": "#474646",
                    "on-surface": "#eae1d4",
                    "on-background": "#eae1d4",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#e9c349",
                    "secondary-fixed-dim": "#c8c6c5",
                    "on-primary-container": "#554300",
                    "brushed-gold": "#D4AF37",
                    "outline-variant": "#4d4635",
                    "success": "#34C759",
                    "secondary-container": "#4a4949",
                    "secondary-fixed": "#e5e2e1",
                    "outline": "#99907c",
                    "primary-fixed": "#ffe088"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .amber-glow {
            box-shadow: 0px 10px 30px rgba(212, 175, 55, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .bg-mesh {
            background-color: #FDFBF7;
            background-image: radial-gradient(at 0% 0%, hsla(45, 65%, 95%, 1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(45, 65%, 90%, 1) 0, transparent 50%);
        }

        input::placeholder {
            color: rgba(18, 18, 18, 0.4);
            font-size: 0.875rem;
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-x-hidden">
<!-- Suppressed Navigation Shell for Focused Transactional Flow -->
<main class="w-full max-w-md fade-in">
<!-- Brand Header Section -->
<div class="text-center mb-10">
<h1 class="font-headline-xl text-headline-xl text-obsidian tracking-widest uppercase">
                AETHER
            </h1>
<p class="font-label-sm text-label-sm text-obsidian/60 mt-2 tracking-widest uppercase">
                Management Portal
            </p>
</div>
<!-- Login Card -->
<div class="glass-card p-10 rounded-lg amber-glow">
<div class="mb-8 text-center">
<span class="material-symbols-outlined text-brushed-gold text-4xl mb-4" style="font-variation-settings: 'wght' 200;">lock_open</span>
<h2 class="font-headline-md text-headline-md text-obsidian">Secure Authentication</h2>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Manager ID Field -->
<div class="relative group">
<label class="block font-label-sm text-label-sm text-obsidian/70 mb-2 uppercase tracking-tighter" for="manager_id">Manager ID</label>
<div class="relative">
<input class="w-full bg-soft-ivory/50 border-b-2 border-brushed-gold/20 focus:border-brushed-gold border-t-0 border-x-0 outline-none px-0 py-3 font-body-md text-obsidian transition-all duration-300" id="manager_id" name="manager_id" placeholder="Enter your unique ID" type="text"/>
<span class="material-symbols-outlined absolute right-0 top-3 text-obsidian/20 group-focus-within:text-brushed-gold transition-colors">badge</span>
</div>
</div>
<!-- Access Code Field -->
<div class="relative group">
<label class="block font-label-sm text-label-sm text-obsidian/70 mb-2 uppercase tracking-tighter" for="access_code">Access Code</label>
<div class="relative">
<input class="w-full bg-soft-ivory/50 border-b-2 border-brushed-gold/20 focus:border-brushed-gold border-t-0 border-x-0 outline-none px-0 py-3 font-body-md text-obsidian transition-all duration-300" id="access_code" name="access_code" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-0 top-3 text-obsidian/20 group-focus-within:text-brushed-gold transition-colors">key</span>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-brushed-gold to-warm-amber text-obsidian font-label-lg text-label-lg py-4 rounded-sm amber-glow hover:brightness-105 active:scale-[0.98] transition-all duration-300 uppercase tracking-widest font-bold" type="submit">
                        Sign In to Portal
                    </button>
</div>
</form>
<!-- Secondary Actions -->
<div class="mt-10 flex flex-col items-center gap-4">
<a class="font-label-sm text-label-sm text-obsidian/60 hover:text-brushed-gold transition-colors duration-300 border-b border-transparent hover:border-brushed-gold pb-0.5" href="#">
                    Forgot Password?
                </a>
<div class="h-px w-8 bg-brushed-gold/20"></div>
<a class="font-label-sm text-label-sm text-obsidian/40 hover:text-obsidian transition-colors duration-300 flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">support_agent</span>
                    Need Support?
                </a>
</div>
</div>
<!-- Footer / Copyright -->
<div class="mt-12 text-center">
<p class="font-body-sm text-body-sm text-obsidian/30 tracking-widest uppercase">
                © 2024 AETHER HOSPITALITY GROUP. <br class="md:hidden"/> ALL RIGHTS RESERVED.
            </p>
</div>
</main>
<!-- Ambient Decorative Elements -->
<div class="fixed top-0 left-0 w-64 h-64 bg-brushed-gold/5 blur-[120px] rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-96 h-96 bg-warm-amber/5 blur-[150px] rounded-full translate-x-1/2 translate-y-1/2 pointer-events-none"></div>
<script>
        // Micro-interaction for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple button press effect
        const btn = document.querySelector('button');
        btn.addEventListener('click', () => {
            // Simulated loading state
            btn.innerHTML = 'Authenticating...';
            btn.style.opacity = '0.8';
            setTimeout(() => {
                btn.innerHTML = 'Sign In to Portal';
                btn.style.opacity = '1';
            }, 1500);
        });
    </script>
</body></html>
